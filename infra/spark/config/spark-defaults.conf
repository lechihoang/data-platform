# Nessie Catalog Configuration (Spark 4.0 + Iceberg 2.x)
spark.sql.catalog.nessie org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.uri http://nessie:19120/api/v1
spark.sql.catalog.nessie.warehouse s3a://lakehouse
spark.sql.catalog.nessie.catalog-impl org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.ref main

# MinIO S3 Configuration
spark.hadoop.fs.s3a.endpoint http://minio:9000
spark.hadoop.fs.s3a.access.key admin
spark.hadoop.fs.s3a.secret.key admin123
spark.hadoop.fs.s3a.path.style.access true

# Iceberg Configuration (Spark 4.0)
spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions
spark.sql.catalogImplementation hive
spark.sql.defaultCatalog nessie

# Iceberg Runtime (Spark 4.0 uses Iceberg 2.x)
spark.sql.catalog.nessie.io-impl org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.nessie.s3.endpoint http://minio:9000
spark.sql.catalog.nessie.s3.path-style-access true

# Dependencies
spark.jars.packages org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.11.0,org.apache.iceberg:iceberg-aws-bundle:1.11.0,org.projectnessie.nessie-integrations:nessie-spark-extensions-4.0_2.13:0.108.1,org.apache.hadoop:hadoop-aws:3.4.1
spark.jars.ivy /tmp/.ivy

# Spark 4.0 Connect Configuration
spark.connect.enabled true
# History Server Configuration
spark.eventLog.enabled true
spark.eventLog.dir file:/opt/spark-events
spark.history.fs.logDirectory file:/opt/spark-events

# Logging Configuration
spark.driver.extraJavaOptions -Dlog4j2.configurationFile=/opt/spark/conf/log4j2.properties
spark.executor.extraJavaOptions -Dlog4j2.configurationFile=/opt/spark/conf/log4j2.properties


# Added by AI Assistant
spark.master spark://spark-master:7077

# Worker Cleanup
spark.worker.cleanup.enabled true
spark.worker.cleanup.appDataTtl 86400
