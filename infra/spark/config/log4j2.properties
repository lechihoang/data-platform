# Console appender configuration
appender.console.type=Console
appender.console.name=console
appender.console.target=SYSTEM_OUT
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# Set root logger level to WARN and append to console only
rootLogger.level=WARN
rootLogger.appenderRef.console.ref=console

# Job-specific logger with WARN level
logger.spark.name=org.apache.spark
logger.spark.level=WARN
logger.spark.appenderRef.console.ref=console

# Executor logger
logger.executor.name=org.apache.spark.executor
logger.executor.level=WARN
logger.executor.appenderRef.console.ref=console

# Task logger
logger.task.name=org.apache.spark.scheduler
logger.task.level=WARN
logger.task.appenderRef.console.ref=console

# SQL logger
logger.sql.name=org.apache.spark.sql
logger.sql.level=WARN
logger.sql.appenderRef.console.ref=console

# Reduce noise from some loggers
logger.hadoop.name=org.apache.hadoop
logger.hadoop.level=WARN
logger.hadoop.appenderRef.console.ref=console

logger.jetty.name=org.eclipse.jetty
logger.jetty.level=WARN
logger.jetty.appenderRef.console.ref=console
